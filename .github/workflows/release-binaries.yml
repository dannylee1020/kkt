name: Release binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload assets for"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  ensure-release:
    name: Ensure draft release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "KKT $RELEASE_TAG" \
            --notes "Binary assets for KKT $RELEASE_TAG."

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset: kkt-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: kkt-darwin-arm64
          - goos: linux
            goarch: amd64
            asset: kkt-linux-amd64
          - goos: linux
            goarch: arm64
            asset: kkt-linux-arm64

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.asset }}" ./cmd/kkt

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "dist/${{ matrix.asset }}" --clobber
