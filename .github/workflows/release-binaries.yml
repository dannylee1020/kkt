name: Release binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload assets for"
        required: true
        default: "v0.1.0"

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ShellCheck
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Shell syntax
        run: bash -n scripts/install.sh scripts/install-cli.sh

      - name: ShellCheck
        run: shellcheck scripts/install.sh scripts/install-cli.sh

      - name: Check npm package
        run: |
          set -euo pipefail
          node --check bin/kkt-install.mjs
          node bin/kkt-install.mjs doctor
          tarball="$(npm pack --silent)"
          trap 'rm -f "$tarball"' EXIT
          npx --yes "./$tarball" doctor
          npx --yes -p "./$tarball" kkt-install doctor

  ensure-release:
    name: Ensure draft release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "kkt $RELEASE_TAG" \
            --notes "Binary assets for kkt $RELEASE_TAG."

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    needs: ensure-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset: kkt-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: kkt-darwin-arm64
          - goos: linux
            goarch: amd64
            asset: kkt-linux-amd64
          - goos: linux
            goarch: arm64
            asset: kkt-linux-arm64

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X github.com/dannylee1020/kkt/internal/workflow.Version=${RELEASE_TAG}" -o "dist/${{ matrix.asset }}" ./cmd/kkt

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "dist/${{ matrix.asset }}" --clobber
