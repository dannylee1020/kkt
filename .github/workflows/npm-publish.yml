name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish to npm"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up npm
        run: |
          set -euo pipefail
          npm install --global npm@12.0.1
          test "$(npm --version)" = "12.0.1"

      - name: Verify package version matches release tag
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          release_version="${release_tag#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$package_version" != "$release_version" ]; then
            echo "package.json version ($package_version) must match release tag ($release_tag -> $release_version)" >&2
            exit 1
          fi

      - name: Check package
        run: |
          set -euo pipefail
          node --check bin/kkt-install.mjs
          node bin/kkt-install.mjs doctor
          npm pack --dry-run

      - name: Publish package
        run: npm publish --access public --provenance
