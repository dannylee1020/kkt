version: "3"

vars:
  KKT_BIN_DIR: '{{default (printf "%s/.local/bin" .HOME) .KKT_BIN_DIR}}'
  KKT_LOCAL_VERSION: '{{default "local-dev" .KKT_LOCAL_VERSION}}'

tasks:
  install-local:
    desc: Install local KKT skills, CLI, and hook adapters from this checkout
    env:
      KKT_BUILD_FROM_SOURCE: "1"
      KKT_VERSION: "{{.KKT_LOCAL_VERSION}}"
    cmds:
      - scripts/install.sh upgrade --hooks --bin-dir {{.KKT_BIN_DIR}}
      - '{{.KKT_BIN_DIR}}/kkt --version'

  test-install-hooks:
    desc: Exercise isolated hook adapter installation and migration paths
    cmds:
      - tests/install-hooks-smoke.sh

  test-runtime-hooks:
    desc: Exercise a selected hook adapter in its real agent runtime
    requires:
      vars: [RUNTIME]
    cmds:
      - tests/runtime-hooks/run.sh {{.RUNTIME}}
